name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: embedder
          POSTGRES_PASSWORD: embedder
          POSTGRES_DB: embeddings
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U embedder -d embeddings"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://embedder:embedder@localhost:5432/embeddings

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (offline suite)
        run: cargo test --locked

      - name: cargo test (live-DB smoke)
        run: cargo test --locked --test live_db -- --ignored --nocapture
