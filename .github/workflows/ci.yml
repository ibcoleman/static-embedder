name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: embedder
          POSTGRES_PASSWORD: embedder
          POSTGRES_DB: embeddings
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U embedder -d embeddings"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://embedder:embedder@localhost:5432/embeddings

    steps:
      - uses: actions/checkout@v4

      # fmt + clippy stay on cargo for now — rules_rust lint/format targets
      # exist but we want the house-standard rustfmt/clippy output until we
      # verify parity. Tracked in ROADMAP Phase 3a.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      # Bazel owns the build + test surface from here on.
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: bazel test (offline suite)
        run: bazel test //...

      - name: bazel test (live-DB smoke)
        run: bazel test //tests:integration_db --config=live
