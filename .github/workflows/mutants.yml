name: mutants

# Mutation testing via cargo-mutants. Slow by nature; scheduled nightly
# plus manual dispatch. A drop in mutation score is a regression even
# when example-based tests stay green (see CLAUDE.md > Testing).

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC nightly
  workflow_dispatch:

jobs:
  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run cargo-mutants
        # Mutation testing only makes sense where the non-ignored test
        # suite can actually observe the mutation. We exclude files
        # whose coverage lives behind `#[ignore]` or that are pure
        # wiring/glue:
        #
        # - src/main.rs: process wiring. The only honest coverage is
        #   spinning up the real server; not a unit-test shape.
        # - src/adapters/model2vec_embedder.rs: exercised by the
        #   ignored `integration_embedder` test (downloads HF weights).
        #   Re-enable once mutants runs against a model cache.
        # - src/adapters/pg_vector_repository.rs: exercised by the
        #   ignored `integration_db` test (needs running Postgres).
        #   Re-enable once mutants runs with a service container.
        # - tests/integration_db.rs: same reason.
        run: |
          cargo mutants --no-shuffle -j 2 \
            --exclude src/main.rs \
            --exclude src/adapters/model2vec_embedder.rs \
            --exclude src/adapters/pg_vector_repository.rs \
            --exclude tests/integration_db.rs

      - name: Upload mutants.out
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-out
          path: mutants.out/
