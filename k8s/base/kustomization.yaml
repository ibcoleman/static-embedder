apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared base. Environment-specific patches live under k8s/overlays/*.
resources:
  - deployment.yaml
  - service.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml

# Stamp every resource so it's easy to target the whole stack:
#   kubectl get all -l app.kubernetes.io/part-of=static-embedder
labels:
  - pairs:
      app.kubernetes.io/part-of: static-embedder
    includeSelectors: false
